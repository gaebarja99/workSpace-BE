# 개발서버(dev) 프로필: 로컬 기본값(localhost) 없이 환경변수로만 접속 정보를 주입받는다.
# 배포 환경에서는 DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASSWORD, JWT_SECRET을 반드시 설정할 것.
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false

logging:
  level:
    com.teamsync.back: INFO
