# 로컬 개발 프로필: docker-compose로 띄운 PostgreSQL에 접속.
# DBeaver로 동일 DB를 직접 관리할 수 있도록 docker-compose.yml과 접속 정보를 통일했다.
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:teamsync}
    username: ${DB_USER:teamsync}
    password: ${DB_PASSWORD:teamsync}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true

logging:
  level:
    com.teamsync.back: DEBUG
