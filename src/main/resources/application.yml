spring:
  application:
    name: teamsync-back
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: validate # 스키마는 Flyway가 관리, Hibernate는 검증만 수행
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

# FR-002: JWT 발급/검증 설정. local 프로필 기본값은 개발 편의용이며 dev/운영 환경에서는
# 반드시 JWT_SECRET 환경변수로 오버라이드할 것 (HS256 기준 최소 256bit/32byte 권장)
teamsync:
  jwt:
    secret: ${JWT_SECRET:teamsync-local-dev-only-secret-key-please-change-32bytes+}
    access-token-expiration-ms: ${JWT_EXPIRATION_MS:3600000} # 1시간
