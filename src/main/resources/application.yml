spring:
  application:
    name: teamsync-back
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: validate # 스키마는 Flyway가 관리, Hibernate는 검증만 수행
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  # FR-204 파일 아카이브 업로드 크기 제한. 필요 시 배포 환경마다 조정한다.
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  # FR-003 이메일 알림 발송용 SMTP. 기본값(빈 host)에서는 실발송을 켜지 않으므로(notification.email.enabled=false)
  # 이 설정은 사용되지 않는다. 배포 환경에서 SMTP_HOST 등을 주입하고 NOTIFICATION_EMAIL_ENABLED=true로 켠다.
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}

server:
  port: ${SERVER_PORT:8080}

# 최소한의 actuator 노출만 허용(NFR-보안, 3.6): health 엔드포인트만 열고 상세 정보는
# 인증된 요청에서만 노출한다(when-authorized). SecurityConfig의 permitAll은 상태 확인용으로 유지.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
  # FR-003 회귀 방지: spring.mail.* 자동설정이 뜨면 MailHealthIndicator가 SMTP 접속을 시도해,
  # 이메일 비활성(기본) 환경에서 /actuator/health가 상시 DOWN(503)이 된다. mail health check는 끄고
  # 실발송 여부는 notification.email.enabled로만 판단한다(핵심 API가 정상이면 health는 UP이어야 함).
  health:
    mail:
      enabled: false

# FR-002: JWT 발급/검증 설정. local 프로필 기본값은 개발 편의용이며 dev/운영 환경에서는
# 반드시 JWT_SECRET 환경변수로 오버라이드할 것 (HS256 기준 최소 256bit/32byte 권장)
teamsync:
  jwt:
    secret: ${JWT_SECRET:teamsync-local-dev-only-secret-key-please-change-32bytes+}
    access-token-expiration-ms: ${JWT_EXPIRATION_MS:3600000} # 1시간
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  # FR-002 SSO(Google/Microsoft/Mock). 로컬 기본은 전부 비활성(client-id 없음)이며 배포 환경마다
  # env로 오버라이드한다. enabled 판정: google/microsoft는 client-id+secret 존재, mock은 아래 enabled.
  sso:
    google:
      client-id: ${SSO_GOOGLE_CLIENT_ID:}
      client-secret: ${SSO_GOOGLE_CLIENT_SECRET:}
    microsoft:
      client-id: ${SSO_MICROSOFT_CLIENT_ID:}
      client-secret: ${SSO_MICROSOFT_CLIENT_SECRET:}
      tenant: ${SSO_MICROSOFT_TENANT:common}
    # mock: 외부 provider 없이 전체 플로우를 검증하는 QA E2E 전용. email은 반드시 기존 워크스페이스
    # 도메인의 이메일이어야 JIT 프로비저닝이 성공한다.
    mock:
      enabled: ${SSO_MOCK_ENABLED:false}
      email: ${SSO_MOCK_EMAIL:}
  # FR-204 파일 아카이브: 현재는 로컬 디스크 저장소만 지원(docker-compose에 S3/오브젝트 스토리지
  # 인프라 없음). 저장 루트 경로만 외부화해 후속에 S3 등으로 교체할 때 이 지점(LocalFileStorageService)만
  # 바꾸면 되도록 한다(PRD 5.1 모듈형 모놀리스, 후속 확장 원칙).
  storage:
    local-base-path: ${STORAGE_LOCAL_PATH:./data/uploads}

# FR-003 알림 이메일/푸시 발송기 설정(SSO의 실/Mock 전환 선례를 따름).
# email/push 모두 기본 비활성(로그 Mock)이며, 배포 env에서 켠다.
# - email.enabled=true & 위 spring.mail SMTP 설정 존재 시 JavaMailSender 실발송, 그 외에는 로그 Mock.
# - push는 FCM 자격증명 부재로 항상 로그 Mock(enabled 값은 로그에만 표시).
notification:
  email:
    enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
    from: ${NOTIFICATION_EMAIL_FROM:no-reply@teamsync.local}
  push:
    enabled: ${NOTIFICATION_PUSH_ENABLED:false}
